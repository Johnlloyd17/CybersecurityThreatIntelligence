version: "3.9"

services:
  cti-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cti-web
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: cti_platform
      DB_USER: cti_user
      DB_PASS: cti_pass
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: cti-db
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "4306:3306"
    environment:
      MYSQL_DATABASE: cti_platform
      MYSQL_USER: cti_user
      MYSQL_PASSWORD: cti_pass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - cti-mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro

volumes:
  cti-mysql-data:
